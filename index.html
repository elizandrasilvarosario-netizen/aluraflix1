<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cosméticos Beauty App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #e777eb;
    }

    header {
      background: #ec74dc;
      color: rgb(254, 253, 255);
      padding: 20px;
      text-align: center;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .product {
      background: rgb(236, 120, 217);
      border-radius: 10px;
      width: 200px;
      margin: 15px;
      padding: 15px;
      box-shadow: 0 4px 8px rgba(191, 134, 214, 0.2);
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #ec77e3;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #f16adb;
    }

    #cart {
      position: fixed;
      right: 0;
      top: 0;
      width: 250px;
      height: 100%;
      background: #e745cc;
      border-left: 2px solid #ee7dd6;
      padding: 15px;
      overflow-y: auto;
    }

    #cart h2 {
      color: #ffffff;
    }
  </style>
</head>

<body>

<header>
  <h1>🎀 Aura Beauty /h1>
  <p>Beleza, cuidado e qualidade em cada detalhe</p>
</header>

<div class="container">
  
  <div class="product">
    <img src="https://via.placeholder.com/150" />
    <h3>Batom Matte</h3>
    <p>R$ 10,00</p>
    <button onclick="addToCart('Batom Matte')">Adicionar</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/150" />
    <h3>Base Líquida</h3>
    <p>R$ 56,00</p>
    <button onclick="addToCart('Base Líquida')">Adicionar</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/150" />
    <h3>Máscara de Cílios</h3>
    <p>R$ 15,00</p>
    <button onclick="addToCart('Máscara de Cílios')">Adicionar</button>
  </div>

</div>

<div id="cart">
  <h2>🛒 Carrinho</h2>
  <ul id="cartItems"></ul>
</div>

<script>
  function addToCart(product) {
    const list = document.getElementById("cartItems");
    const item = document.createElement("li");
    item.textContent = product;
    list.appendChild(item);
  }
</script>

</body>
</html>
